<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111113" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <title>Morning Hoops</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* ── Typography Scale ── */
        --type-display:   clamp(2rem, 5.5vw, 3.5rem);
        --type-headline:  clamp(1.375rem, 3.5vw, 1.875rem);
        --type-title:     clamp(1.125rem, 2.8vw, 1.375rem);
        --type-stat-hero: clamp(2.25rem, 6vw, 3rem);
        --type-stat-lg:   clamp(1.375rem, 3.5vw, 1.75rem);
        --type-stat-md:   clamp(1rem, 2.5vw, 1.25rem);
        --type-body:      clamp(0.8125rem, 1.8vw, 0.875rem);
        --type-body-sm:   clamp(0.6875rem, 1.5vw, 0.75rem);
        --type-label:     clamp(0.5625rem, 1.2vw, 0.625rem);
        --type-label-lg:  clamp(0.625rem, 1.4vw, 0.6875rem);

        /* ── Line Height & Max Width ── */
        --type-body-lh:   1.6;
        --type-body-max-w: min(600px, 100%);

        /* ── Spacing Scale ── */
        --space-page-x:    clamp(1rem, 4vw, 1.25rem);
        --space-page-top:  clamp(1.5rem, 5vw, 2.5rem);
        --space-page-bot:  clamp(3.75rem, 10vw, 6.25rem);
        --space-section-gap: clamp(1.75rem, 5vw, 2.5rem);
        --space-card-padding: clamp(0.875rem, 3vw, 1.25rem);
        --space-card-gap:  clamp(0.375rem, 1.5vw, 0.5rem);
        --space-prose-max: min(600px, 100%);

        /* ── Layout ── */
        --content-max:     920px;
        --nav-height:      48px;

        /* ── Dynamic viewport height ── */
        --app-height: 100vh;
      }
      @supports (height: 100dvh) {
        :root { --app-height: 100dvh; }
      }
      html {
        background-color: #111113;
      }
      body {
        margin: 0;
        overscroll-behavior-y: contain;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
